name: CI

# Trigger on pushes and pull requests targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Clone the repository
      - uses: actions/checkout@v4

      # Install the .NET 10 SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Download all NuGet packages
      - name: Restore dependencies
        run: dotnet restore Klosterbryggeriet.slnx

      # Compile the solution in Release mode 
      - name: Build
        run: dotnet build Klosterbryggeriet.slnx --no-restore --configuration Release

      # Run all xUnit tests 
      - name: Test
        run: dotnet test Klosterbryggeriet.slnx --no-build --configuration Release --verbosity normal